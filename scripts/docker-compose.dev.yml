name: memoryfs-dev

services:

  levara:
    # Primary vector store + embedder backend (replaces Qdrant).
    # gRPC: 50051 (used by LevaraVectorStore / LevaraEmbedder)
    # HTTP: 8080 (Swagger UI, metrics)
    build:
      context: ${LEVARA_REPO_PATH:?Set LEVARA_REPO_PATH to your Levara/Levara checkout}
      dockerfile: Dockerfile
    container_name: memoryfs-levara
    ports:
      - "127.0.0.1:50051:50051"  # gRPC (tonic client)
      - "127.0.0.1:8080:8080"    # HTTP API + /metrics
    volumes:
      - levara_data:/app/data
    environment:
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-http://host.docker.internal:11434/api/embed}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - ENV=dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "./levara"
      - "-standalone=true"
      - "-dim=${EMBEDDING_DIM:-768}"
      - "-shards=3"
      - "-port=8080"
      - "-grpc-port=50051"
      - "-require-auth=false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Embedding server ────────────────────────────────────────────
  # Option A (arm64/Apple Silicon): Use Ollama running on the host.
  #   Install: brew install ollama && ollama serve
  #   Pull model: ollama pull nomic-embed-text
  #   Levara connects via host.docker.internal:11434.
  #
  # Option B (x86/Linux with TEI): Uncomment the block below and
  #   set EMBEDDING_ENDPOINT=http://embedding:80/v1/embeddings
  #   and EMBEDDING_MODEL=google/embedding-gemma in .env.
  #
  # embedding:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
  #   container_name: memoryfs-embedding
  #   ports:
  #     - "127.0.0.1:8090:80"
  #   volumes:
  #     - tei_cache:/data
  #   command: ["--model-id", "google/embedding-gemma", "--port", "80"]
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 120s
  #   restart: unless-stopped

volumes:
  levara_data:
  # tei_cache:  # uncomment for TEI
