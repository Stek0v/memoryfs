# Secret scanning configuration for the MemoryFS repository.
#
# tests/adversarial/secrets-suite/ contains intentional test fixtures
# with synthetic API tokens, JWTs, private keys, and IBANs that exercise
# the pre-redaction pipeline. These are NOT real secrets — every value
# is either a documented public test key (e.g. Stripe sk_test_4eC39...
# from the official Stripe docs) or a clearly synthetic placeholder
# (e.g. AKIAIOSFODNN7EXAMPLE — AWS's own example access key).
#
# Excluding the path keeps the secret-scanner from blocking pushes
# of the adversarial corpora and from flagging them in code-scanning
# alerts. The pre-redaction code under test still treats these as
# real secret-shaped strings, which is the entire point of the suite.

paths-ignore:
  - "tests/adversarial/secrets-suite/**"
  - "fixtures/**"
